<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Tank — AI Shark Tank Simulator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --bg:#07090d;
  --bg-grad: radial-gradient(120% 120% at 50% -10%, #0e1722 0%, #07090d 55%);
  --surface:#11151c;
  --surface-2:#161b24;
  --surface-3: #1c222d;
  --border: rgba(232,184,84,0.16);
  --border-soft: rgba(255,255,255,0.07);
  --gold:#e8b854;
  --gold-soft:#f3d79a;
  --teal:#2bb8b0;
  --green:#4cb963;
  --lavender:#b98ee0;
  --red:#d8493b;
  --text:#ece9e2;
  --text-dim:#a3aab5;
  --text-faint:#5b6470;
  --font-display:'Anton', sans-serif;
  --font-body:'Inter', -apple-system, system-ui, sans-serif;
  --font-mono:'JetBrains Mono', monospace;
  --ease: cubic-bezier(.16,.84,.32,1);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: var(--bg-grad);
  color: var(--text);
  font-family: var(--font-body);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:"";
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(43,184,176,0.07), transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(232,184,84,0.06), transparent 40%);
}
::selection{ background: var(--gold); color:#15110a; }
a{color:var(--gold);}
button{font-family:inherit;}
:focus-visible{ outline: 2px solid var(--gold-soft); outline-offset: 3px; border-radius: 4px; }

.app{ position:relative; z-index:1; max-width:1080px; margin:0 auto; padding: 28px 20px 80px; }

/* ---------- Top bar ---------- */
.topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 34px; gap:12px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:12px; }
.brand-mark{ width:40px; height:40px; flex:none; }
.brand-text{ font-family:var(--font-display); font-size:26px; letter-spacing:0.5px; line-height:1; }
.brand-text span{ color:var(--gold); }
.brand-sub{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:2px; color:var(--text-faint); text-transform:uppercase; margin-top:2px; }
.topbar-actions{ display:flex; gap:10px; }
.icon-btn{
  background: var(--surface); border:1px solid var(--border-soft); color:var(--text-dim);
  padding:9px 14px; border-radius:10px; font-size:12.5px; font-family:var(--font-mono);
  cursor:pointer; display:flex; align-items:center; gap:6px; transition: all .2s var(--ease);
}
.icon-btn:hover{ border-color: var(--border); color:var(--text); transform: translateY(-1px); }

/* ---------- Stage wrap / transitions ---------- */
.stage{ animation: stageIn .5s var(--ease) both; }
@keyframes stageIn{ from{opacity:0; transform: translateY(14px);} to{opacity:1; transform:translateY(0);} }

.card{
  background: linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
  border:1px solid var(--border-soft);
  border-radius:18px;
  padding: 28px;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:""; position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity:.5;
}

.eyebrow{ font-family:var(--font-mono); font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin:0 0 10px; }
h1.headline{ font-family:var(--font-display); font-size: clamp(30px,5vw,46px); line-height:1.02; letter-spacing:0.3px; margin: 0 0 10px; }
p.lede{ color:var(--text-dim); font-size:15px; line-height:1.6; max-width:620px; margin:0 0 24px; }

/* ---------- Form ---------- */
.form-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
.field{ display:flex; flex-direction:column; gap:7px; }
.field.full{ grid-column: 1 / -1; }
.field label{ font-family:var(--font-mono); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); }
.field input, .field textarea{
  background: var(--bg); border:1px solid var(--border-soft); border-radius:10px;
  color:var(--text); padding:12px 14px; font-size:14.5px; font-family:var(--font-body);
  resize:vertical; transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
}
.field input:focus, .field textarea:focus{ border-color: var(--gold); box-shadow: 0 0 0 3px rgba(232,184,84,0.12); outline:none; }
.field .hint{ font-size:11.5px; color:var(--text-faint); }

.btn{
  font-family:var(--font-mono); font-weight:700; font-size:13px; letter-spacing:1px; text-transform:uppercase;
  padding:14px 26px; border-radius:11px; border:none; cursor:pointer;
  display:inline-flex; align-items:center; gap:10px; justify-content:center;
  transition: transform .18s var(--ease), box-shadow .18s var(--ease), filter .18s var(--ease);
}
.btn-primary{ background: linear-gradient(135deg, var(--gold-soft), var(--gold)); color:#15110a; box-shadow: 0 8px 24px -8px rgba(232,184,84,0.45); }
.btn-primary:hover{ transform: translateY(-2px); filter:brightness(1.05); }
.btn-primary:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.btn-ghost{ background: transparent; color:var(--text-dim); border:1px solid var(--border-soft); }
.btn-ghost:hover{ color:var(--text); border-color: var(--border); }
.btn-row{ display:flex; gap:12px; margin-top:26px; justify-content:flex-end; flex-wrap:wrap; }

/* ---------- Pitch reveal ---------- */
.pitch-card{ margin-bottom:22px; }
.pitch-meta{ display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
.chip{ font-family:var(--font-mono); font-size:11.5px; background: var(--bg); border:1px solid var(--border-soft); padding:6px 12px; border-radius:999px; color:var(--text-dim); }
.chip b{ color:var(--gold-soft); }

.tank-loading{ display:flex; flex-direction:column; align-items:center; gap:18px; padding: 50px 0; }
.fin-track{ position:relative; width:100%; max-width:420px; height:60px; }
.fin{ position:absolute; top:18px; animation: swim 3.2s linear infinite; }
.fin:nth-child(2){ animation-delay:-1s; top:6px; opacity:.7; transform:scale(.8); }
.fin:nth-child(3){ animation-delay:-2.1s; top:32px; opacity:.5; transform:scale(.65); }
@keyframes swim{ from{ left:-40px; } to{ left:100%; } }
.tank-loading-text{ font-family:var(--font-mono); font-size:12.5px; color:var(--text-dim); letter-spacing:1px; }
.tank-loading-text .dots::after{ content:''; animation: dotpulse 1.4s steps(4) infinite; }
@keyframes dotpulse{ 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

/* ---------- Judges grid ---------- */
.judges-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:14px; margin-bottom:24px; }
.judge-card{
  background: var(--surface); border:1px solid var(--border-soft); border-radius:14px; padding:16px;
  text-align:center; transition: all .25s var(--ease); cursor:default;
}
.judge-card.active{ border-color: var(--jc); box-shadow: 0 0 0 1px var(--jc), 0 10px 30px -12px var(--jc); transform: translateY(-3px); }
.judge-fin-icon{ width:46px; height:30px; margin:0 auto 10px; }
.judge-name{ font-weight:700; font-size:14px; margin-bottom:2px; }
.judge-title{ font-family:var(--font-mono); font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color: var(--jc); margin-bottom:6px; }
.judge-focus{ font-size:11.5px; color:var(--text-faint); line-height:1.4; }
.gauge-wrap{ margin-top:12px; display:flex; align-items:center; justify-content:center; gap:6px; }
.gauge{ width:60px; height:6px; background: rgba(255,255,255,0.08); border-radius:6px; overflow:hidden; }
.gauge-fill{ height:100%; background: var(--jc); border-radius:6px; transition: width .6s var(--ease); }
.gauge-label{ font-family:var(--font-mono); font-size:9.5px; color:var(--text-faint); }

/* ---------- QA flow ---------- */
.qa-card{ border-left:3px solid var(--jc); }
.qa-judge-row{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.qa-fin{ width:38px; height:24px; flex:none; }
.qa-judge-meta b{ font-size:15px; }
.qa-judge-meta div.role{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:1px; color:var(--jc); text-transform:uppercase; }
.qa-counter{ margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--text-faint); }
.qa-question{ font-size:17px; line-height:1.5; margin: 6px 0 18px; font-weight:600; }
.qa-question::before{ content:"“"; color:var(--jc); }
.qa-question::after{ content:"”"; color:var(--jc); }
.qa-reaction{
  margin-top:16px; padding:13px 16px; background: var(--bg); border-radius:10px;
  border:1px dashed var(--border-soft); font-size:13.5px; color:var(--text-dim); font-style:italic;
  animation: fadeUp .4s var(--ease) both;
}
@keyframes fadeUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
.qa-history{ display:flex; flex-direction:column; gap:10px; margin-bottom:20px; max-height:340px; overflow-y:auto; padding-right:4px; }
.qa-history::-webkit-scrollbar{ width:6px; }
.qa-history::-webkit-scrollbar-thumb{ background: var(--border-soft); border-radius:6px; }
.qa-history-item{ font-size:12.5px; padding:10px 12px; border-radius:10px; background: var(--surface); border:1px solid var(--border-soft); }
.qa-history-item .h-q{ color: var(--jc); font-weight:600; margin-bottom:4px; }
.qa-history-item .h-a{ color:var(--text-dim); margin-bottom:4px; }
.qa-history-item .h-r{ color:var(--text-faint); font-style:italic; }

/* ---------- Scoring ---------- */
.score-row{ display:flex; align-items:center; gap:14px; margin-bottom:16px; }
.score-label{ width:190px; flex:none; font-size:13px; color:var(--text-dim); font-family:var(--font-mono); letter-spacing:0.4px; }
.score-bar{ flex:1; height:10px; background: rgba(255,255,255,0.06); border-radius:8px; overflow:hidden; }
.score-fill{ height:100%; border-radius:8px; width:0%; transition: width 1.1s var(--ease); background: linear-gradient(90deg, var(--teal), var(--gold)); }
.score-num{ width:42px; text-align:right; font-family:var(--font-mono); font-weight:700; color:var(--gold-soft); }
.overall-score{ display:flex; align-items:center; gap:24px; margin: 26px 0 30px; padding:20px; background: var(--bg); border-radius:14px; border:1px solid var(--border-soft); }
.overall-num{ font-family:var(--font-display); font-size:64px; color:var(--gold); line-height:1; }
.overall-meta .label{ font-family:var(--font-mono); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); }
.overall-meta .verdict-tag{ font-size:14px; color:var(--text-dim); margin-top:4px; }

/* ---------- Verdict ---------- */
.verdict-banner{
  text-align:center; padding: 38px 24px; border-radius:18px; margin-bottom: 24px;
  position:relative; overflow:hidden; border:1px solid var(--border-soft);
}
.verdict-banner.invest, .verdict-banner.acquire{ background: linear-gradient(150deg, rgba(76,185,99,0.16), rgba(232,184,84,0.10)); border-color: rgba(76,185,99,0.35); }
.verdict-banner.reject{ background: linear-gradient(150deg, rgba(216,73,59,0.16), rgba(20,10,10,0.2)); border-color: rgba(216,73,59,0.35); }
.verdict-banner.later{ background: linear-gradient(150deg, rgba(185,142,224,0.14), rgba(20,16,30,0.2)); border-color: rgba(185,142,224,0.35); }
.verdict-eyebrow{ font-family:var(--font-mono); font-size:12px; letter-spacing:3px; text-transform:uppercase; color: var(--text-dim); margin-bottom:8px; }
.verdict-title{ font-family:var(--font-display); font-size: clamp(38px,7vw,68px); line-height:1; letter-spacing:1px; }
.verdict-title.invest, .verdict-title.acquire{ color: var(--green); }
.verdict-title.reject{ color: var(--red); }
.verdict-title.later{ color: var(--lavender); }
.verdict-sub{ margin-top:10px; color:var(--text-dim); font-size:14.5px; }

.deal-terms{ display:grid; grid-template-columns: repeat(3,1fr); gap:14px; margin: 22px 0; }
.deal-term{ background: var(--bg); border:1px solid var(--border-soft); border-radius:12px; padding:16px; text-align:center; }
.deal-term .dt-label{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-faint); }
.deal-term .dt-value{ font-family:var(--font-display); font-size:26px; color:var(--gold-soft); margin-top:6px; }

.judge-verdicts{ display:grid; grid-template-columns: repeat(2,1fr); gap:14px; margin-top:20px; }
.judge-verdict-card{ background: var(--surface); border-left:3px solid var(--jc); border-radius:12px; padding:16px; }
.judge-verdict-card .jv-name{ font-weight:700; font-size:13.5px; }
.judge-verdict-card .jv-stance{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:1px; text-transform:uppercase; color: var(--jc); margin:2px 0 8px; }
.judge-verdict-card .jv-text{ font-size:13px; color:var(--text-dim); line-height:1.55; }

.reasoning-block{ margin-top:20px; padding:18px; background: var(--bg); border-radius:12px; border:1px solid var(--border-soft); font-size:14px; line-height:1.65; color:var(--text-dim); }
.reasoning-block b{ color:var(--text); }

/* ---------- Leaderboard ---------- */
.leaderboard-panel{ margin-top:30px; }
.lb-row{ display:flex; align-items:center; gap:12px; padding:11px 6px; border-bottom:1px solid var(--border-soft); font-size:13.5px; }
.lb-row:last-child{ border-bottom:none; }
.lb-rank{ font-family:var(--font-mono); color:var(--gold); width:26px; font-weight:700; }
.lb-name{ flex:1; font-weight:600; }
.lb-name .lb-decision{ font-family:var(--font-mono); font-size:10px; color:var(--text-faint); margin-left:8px; text-transform:uppercase; }
.lb-score{ font-family:var(--font-mono); color:var(--gold-soft); font-weight:700; }
.empty-state{ color:var(--text-faint); font-size:13px; text-align:center; padding:24px 0; }

/* ---------- Confetti canvas ---------- */
#confetti-canvas{ position:fixed; inset:0; pointer-events:none; z-index:50; }

/* ---------- Misc ---------- */
.skel{ height:14px; border-radius:6px; background: linear-gradient(90deg, var(--surface) 25%, var(--surface-3) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.6s linear infinite; }
@keyframes shimmer{ from{ background-position: 200% 0;} to{ background-position: -200% 0;} }
.section-gap{ margin-top:24px; }
.toast{
  position:fixed; bottom:24px; left:50%; transform: translateX(-50%) translateY(20px); opacity:0;
  background: var(--surface-2); border:1px solid var(--border); color:var(--text); padding:12px 20px;
  border-radius:10px; font-size:13px; font-family:var(--font-mono); z-index:60; transition: all .3s var(--ease);
  box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
}
.toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

@media (max-width:720px){
  .form-grid{ grid-template-columns: 1fr; }
  .judges-grid{ grid-template-columns: repeat(2,1fr); }
  .deal-terms{ grid-template-columns: 1fr; }
  .judge-verdicts{ grid-template-columns: 1fr; }
  .score-label{ width:120px; font-size:11px; }
  .overall-num{ font-size:48px; }
}

@media print{
  body{ background:#fff !important; color:#111 !important; }
  body::before{ display:none; }
  .no-print{ display:none !important; }
  .card, .judge-card, .judge-verdict-card, .deal-term, .lb-row, .reasoning-block, .qa-history-item{
    background:#fff !important; border-color:#ccc !important; color:#111 !important; box-shadow:none !important;
  }
  .verdict-banner{ background:#f7f7f7 !important; }
  a{ color:#000; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>

<div class="app" id="app"></div>

<script>
/* ============================================================
   THE TANK — AI Shark Tank Simulator
   Single-file, no backend. Uses window.claude completion API
   for dynamic judge behavior, with graceful offline fallbacks.
   ============================================================ */

const JUDGES = [
  { id:'vc', name:'Arjun Mehta', title:'The Venture Capitalist', focus:'Market size & scalability', color:'var(--teal)', hex:'#2bb8b0',
    system:"You are Arjun Mehta, a sharp, data-driven venture capitalist on a Shark Tank style panel. You care almost exclusively about total addressable market, scalability, growth ceiling, and whether this can become a venture-scale outcome. You are direct, slightly clinical, use phrases like 'TAM', 'unit economics at scale', 'category leader'. You are skeptical of small niche ideas." },
  { id:'founder', name:'Sana Verma', title:'The Founder', focus:'Execution & speed', color:'var(--gold)', hex:'#e8b854',
    system:"You are Sana Verma, a battle-tested startup founder who has built and shipped products under pressure. You care about execution: can this team actually build and ship this, how fast, with what resources, what's the biggest execution risk. You are blunt, practical, allergic to vague plans, and respect specificity." },
  { id:'customer', name:'Rohit Bose', title:'The Customer', focus:'Real-world usefulness', color:'var(--green)', hex:'#4cb963',
    system:"You are Rohit Bose, representing the everyday customer on the panel. You care only about whether this genuinely, personally useful and whether you yourself would use and pay for it. You speak plainly, ask grounded 'would I actually use this' questions, and are unimpressed by jargon or hype." },
  { id:'angel', name:'Devika Rao', title:'The Angel Investor', focus:'Profitability & margins', color:'var(--lavender)', hex:'#b98ee0',
    system:"You are Devika Rao, an angel investor focused on profitability, margins, burn rate, and path to sustainable cash flow. You are warm but financially exacting, you probe on pricing, cost structure, and how soon this can be self-sustaining without further funding." }
];

const state = {
  stage: 'form',
  pitch: { name:'', problem:'', solution:'', revenue:'', audience:'', ask:'' },
  qaPlan: null,        // { judges: [{id, opening, questions:[q1,q2]}] }
  answers: {},         // key `${judgeId}-${qIdx}` -> { question, answer, reaction }
  flatQueue: [],        // ordered [{judgeId, qIdx}]
  currentQA: 0,
  result: null,         // final scoring/verdict object
  loadingQA: false,
  loadingReaction: false,
  loadingResult: false,
  leaderboard: [],
};

const $ = (sel, root=document) => root.querySelector(sel);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className = cls; if(html!==undefined) e.innerHTML = html; return e; };
const escapeHtml = (s='') => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function showToast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(()=> t.classList.remove('show'), 2600);
}

/* ---------------- AI call helper ---------------- */
async function callAI(systemPrompt, userPrompt, { json=true } = {}){
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role:"user", content: userPrompt }]
    })
  });
  if(!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
  if(!json) return text;
  const cleaned = text.replace(/^```json\s*|^```\s*|```$/gim, '').trim();
  return JSON.parse(cleaned);
}

/* ---------------- Fallback generators (offline-safe) ---------------- */
function fallbackQuestions(p){
  const map = {
    vc: [`How big is the actual market for "${p.name}", and what stops a bigger player from copying you?`, `What does this look like at 100x scale — same model, or does it break?`],
    founder: [`Walk me through how you'd actually build and ship "${p.solution}" in the next 90 days.`, `What's the single biggest reason this fails, and what have you done about it?`],
    customer: [`Honestly — would you personally pay for this, and why would I choose it over what I already use?`, `What's the very first thing a new user does, and does it actually solve their problem on day one?`],
    angel: [`Walk me through the unit economics — what does it cost you to acquire and serve one customer?`, `How long until this is cash-flow positive without more outside money?`]
  };
  return JUDGES.map(j => ({
    id: j.id,
    opening: `${j.name} leans in, focused on ${j.focus.toLowerCase()}.`,
    questions: map[j.id]
  }));
}
function fallbackReaction(judge, q, a){
  const len = (a||'').trim().length;
  const lines = len > 140
    ? [`${judge.name} nods slowly. "There's real thinking there — but I want to see it proven, not just stated."`,
       `${judge.name} taps the table. "Good detail. That's the kind of answer that buys you another question, not a check."`]
    : [`${judge.name} raises an eyebrow. "That's a thin answer for a question this important."`,
       `${judge.name} frowns slightly. "I need more than that to feel comfortable with this."`];
  return lines[Math.floor(Math.random()*lines.length)];
}
function fallbackScoring(p, transcript){
  let avgLen = 0, n = 0;
  Object.values(state.answers).forEach(a => { avgLen += (a.answer||'').length; n++; });
  avgLen = n ? avgLen / n : 0;
  const base = Math.max(40, Math.min(82, 50 + avgLen / 6));
  const jitter = () => Math.round(base + (Math.random()*16 - 8));
  const scores = {
    marketPotential: Math.min(96, Math.max(28, jitter())),
    innovation: Math.min(96, Math.max(28, jitter())),
    businessModel: Math.min(96, Math.max(28, jitter())),
    execution: Math.min(96, Math.max(28, jitter())),
    investmentWorthiness: Math.min(96, Math.max(28, jitter())),
  };
  const overall = Math.round(Object.values(scores).reduce((a,b)=>a+b,0)/5);
  let decision = 'reject';
  if(overall >= 88) decision = 'acquire';
  else if(overall >= 72) decision = 'invest';
  else if(overall >= 56) decision = 'later';
  const askNum = (p.ask.match(/[\d,.]+/)||['50,000'])[0].replace(/,/g,'');
  const askVal = parseFloat(askNum) || 50000;
  const valuation = Math.round(askVal * (6 + Math.random()*4));
  const funding = decision === 'reject' ? 0 : Math.round(askVal * (0.6 + Math.random()*0.7));
  return {
    scores,
    overall,
    decision,
    valuation: decision === 'reject' ? 0 : valuation,
    funding,
    reasoning: decision === 'reject'
      ? `The panel felt "${p.name}" hasn't yet de-risked enough on execution and market clarity to justify a check today. The core idea has merit, but the answers in the room didn't close the gaps the sharks needed closed.`
      : `The panel was won over by the clarity of "${p.solution}" for ${p.audience}. The numbers and answers in the room suggested enough conviction to back this, with terms reflecting the stage of proof shown today.`,
    judgeVerdicts: JUDGES.map(j => ({
      id: j.id, name: j.name,
      stance: decision === 'reject' ? 'Passing' : (decision==='acquire' ? 'Strong yes' : (decision==='later' ? 'Not yet' : 'In')),
      text: `${j.name} weighed this mainly on ${j.focus.toLowerCase()} and landed roughly where the rest of the panel did.`
    }))
  };
}

async function runPitchSequence(){
  await new Promise(r => setTimeout(r, 900));
  const p = state.pitch;
  const sys = "You are simulating a panel of 4 Shark-Tank-style judges. Respond ONLY with valid JSON, no markdown fences, no preamble. Each judge asks exactly 2 sharp, specific questions tied to the actual pitch details given — never generic filler questions.";
  const usr = `Pitch details:\nStartup: ${p.name}\nProblem: ${p.problem}\nSolution: ${p.solution}\nRevenue model: ${p.revenue}\nTarget audience: ${p.audience}\nFunding ask: ${p.ask}\n\nJudge personas:\n${JUDGES.map(j=>`- id:"${j.id}" — ${j.system}`).join('\n')}\n\nReturn JSON exactly in this shape:\n{"judges":[{"id":"vc","opening":"one short sentence of in-character reaction to the pitch","questions":["question 1","question 2"]}, ... one object per judge id in order vc, founder, customer, angel]}`;
  try{
    state.qaPlan = await callAI(sys, usr);
    if(!state.qaPlan || !Array.isArray(state.qaPlan.judges) || state.qaPlan.judges.length < 4) throw new Error('bad shape');
  } catch(e){
    const fb = fallbackQuestions(p);
    state.qaPlan = { judges: fb };
  }
  // build flat queue in shark order: each judge's Q1, then Q2 round-robin for drama pacing
  state.flatQueue = [];
  for(let qIdx=0; qIdx<2; qIdx++){
    JUDGES.forEach(j => state.flatQueue.push({ judgeId: j.id, qIdx }));
  }
  state.currentQA = 0;
  state.stage = 'qa';
  render();
}

function getJudge(id){ return JUDGES.find(j => j.id === id); }
function getQuestion(judgeId, qIdx){
  const jp = state.qaPlan.judges.find(j => j.id === judgeId);
  return jp ? jp.questions[qIdx] : '';
}

function renderQA(){
  const wrap = el('div', 'stage');

  // judges overview strip
  const grid = el('div', 'judges-grid');
  JUDGES.forEach(j => {
    const answeredCount = Object.keys(state.answers).filter(k => k.startsWith(j.id+'-')).length;
    const card = el('div', 'judge-card');
    card.style.setProperty('--jc', j.hex);
    const isActive = state.flatQueue[state.currentQA] && state.flatQueue[state.currentQA].judgeId === j.id;
    if(isActive) card.classList.add('active');
    card.innerHTML = `
      <svg class="judge-fin-icon" viewBox="0 0 60 40"><path d="M2 26C10 14 22 8 34 10C30 14 28 18 28 22C36 20 46 22 54 30C42 30 32 32 26 36C16 38 6 34 2 26Z" fill="${j.hex}"/></svg>
      <div class="judge-name">${j.name}</div>
      <div class="judge-title" style="color:${j.hex}">${j.title}</div>
      <div class="judge-focus">${j.focus}</div>
      <div class="gauge-wrap"><div class="gauge"><div class="gauge-fill" style="width:${answeredCount*50}%; background:${j.hex}"></div></div><span class="gauge-label">${answeredCount}/2</span></div>
    `;
    grid.appendChild(card);
  });
  wrap.appendChild(grid);

  // history of answered questions
  const answeredKeys = Object.keys(state.answers);
  if(answeredKeys.length){
    const histCard = el('div', 'card');
    histCard.innerHTML = `<div class="eyebrow">Transcript so far</div>`;
    const hist = el('div', 'qa-history');
    answeredKeys.forEach(k => {
      const a = state.answers[k];
      const j = getJudge(k.split('-')[0]);
      const item = el('div', 'qa-history-item');
      item.innerHTML = `<div class="h-q" style="color:${j.hex}">${j.name}: ${escapeHtml(a.question)}</div><div class="h-a">You: ${escapeHtml(a.answer)}</div><div class="h-r">${escapeHtml(a.reaction||'')}</div>`;
      hist.appendChild(item);
    });
    histCard.appendChild(hist);
    wrap.appendChild(histCard);
  }

  // current question card
  if(state.currentQA < state.flatQueue.length){
    const { judgeId, qIdx } = state.flatQueue[state.currentQA];
    const j = getJudge(judgeId);
    const card = el('div', 'card qa-card section-gap');
    card.style.setProperty('--jc', j.hex);
    const question = getQuestion(judgeId, qIdx);
    card.innerHTML = `
      <div class="qa-judge-row">
        <svg class="qa-fin" viewBox="0 0 60 40"><path d="M2 26C10 14 22 8 34 10C30 14 28 18 28 22C36 20 46 22 54 30C42 30 32 32 26 36C16 38 6 34 2 26Z" fill="${j.hex}"/></svg>
        <div class="qa-judge-meta"><b>${j.name}</b><div class="role" style="color:${j.hex}">${j.title}</div></div>
        <div class="qa-counter">Question ${state.currentQA+1} / ${state.flatQueue.length}</div>
      </div>
      <div class="qa-question">${escapeHtml(question)}</div>
    `;
    const field = el('div', 'field');
    const ta = el('textarea');
    ta.rows = 4;
    ta.placeholder = 'Answer like you mean it — specifics beat enthusiasm.';
    field.appendChild(ta);
    card.appendChild(field);

    const reactionSlot = el('div');
    card.appendChild(reactionSlot);

    const row = el('div', 'btn-row');
    const submitBtn = el('button', 'btn btn-primary', state.loadingReaction ? 'Sharks are reacting…' : 'Answer the shark →');
    submitBtn.disabled = state.loadingReaction;
    submitBtn.onclick = async () => {
      const answer = ta.value.trim();
      if(!answer){ showToast('Give the shark an actual answer.'); return; }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sharks are reacting…';
      reactionSlot.innerHTML = `<div class="qa-reaction skel" style="height:40px;"></div>`;
      const reaction = await getReaction(j, question, answer);
      state.answers[`${judgeId}-${qIdx}`] = { question, answer, reaction };
      reactionSlot.innerHTML = `<div class="qa-reaction">${escapeHtml(reaction)}</div>`;
      await new Promise(r => setTimeout(r, 1100));
      state.currentQA++;
      if(state.currentQA >= state.flatQueue.length){
        state.stage = 'scoring';
        render();
        runScoring();
      } else {
        render();
      }
    };
    row.appendChild(submitBtn);
    card.appendChild(row);
    wrap.appendChild(card);
  }

  return wrap;
}

async function getReaction(judge, question, answer){
  const sys = `${judge.system} Respond ONLY with plain text — one short in-character reaction (max 2 sentences) to the founder's answer, written in third person like stage direction plus dialogue, e.g. "Name leans back. \\"line of dialogue.\\"" No JSON, no markdown.`;
  const usr = `Your question was: "${question}"\nThe founder answered: "${answer}"\nReact in character, max 2 sentences.`;
  try{
    const text = await callAI(sys, usr, { json:false });
    if(text && text.length > 3) return text;
    throw new Error('empty');
  } catch(e){
    return fallbackReaction(judge, question, answer);
  }
}

async function runScoring(){
  const p = state.pitch;
  const transcript = Object.entries(state.answers).map(([k,a]) => {
    const j = getJudge(k.split('-')[0]);
    return `${j.name} asked: "${a.question}" — Founder answered: "${a.answer}" — Reaction: "${a.reaction}"`;
  }).join('\n');

  const sys = "You are the head judge synthesizing a 4-person Shark-Tank-style panel's verdict. Respond ONLY with valid JSON, no markdown fences, no preamble. Scores are integers 0-100. Decision must be exactly one of: invest, reject, acquire, later (later means 'come back later'). Valuation and funding are USD numbers (funding is 0 if decision is reject).";
  const usr = `Pitch:\nStartup: ${p.name}\nProblem: ${p.problem}\nSolution: ${p.solution}\nRevenue model: ${p.revenue}\nTarget audience: ${p.audience}\nFunding ask: ${p.ask}\n\nFull Q&A transcript:\n${transcript}\n\nReturn JSON exactly in this shape:\n{"scores":{"marketPotential":0,"innovation":0,"businessModel":0,"execution":0,"investmentWorthiness":0},"overall":0,"decision":"invest","valuation":0,"funding":0,"reasoning":"2-3 sentence overall reasoning referencing specifics from the pitch and answers","judgeVerdicts":[{"id":"vc","name":"Arjun Mehta","stance":"short stance phrase like 'In' or 'Passing' or 'Strong yes' or 'Not yet'","text":"1-2 sentence judge-specific reasoning in character, focused on their own focus area"},{"id":"founder","name":"Sana Verma","stance":"...","text":"..."},{"id":"customer","name":"Rohit Bose","stance":"...","text":"..."},{"id":"angel","name":"Devika Rao","stance":"...","text":"..."}]}`;

  try{
    const result = await callAI(sys, usr);
    if(!result || !result.scores || !result.decision) throw new Error('bad shape');
    result.overall = result.overall || Math.round(Object.values(result.scores).reduce((a,b)=>a+b,0)/5);
    state.result = result;
  } catch(e){
    state.result = fallbackScoring(p, transcript);
  }
  state.stage = 'verdict';
  render();
  animateScoresAndMaybeConfetti();
  await saveToLeaderboard({
    name: state.pitch.name,
    overall: state.result.overall,
    decision: state.result.decision,
    at: Date.now()
  });
  rerenderLeaderboardOnly();
}

function animateScoresAndMaybeConfetti(){
  requestAnimationFrame(() => {
    document.querySelectorAll('.score-fill').forEach(f => {
      const target = f.getAttribute('data-target');
      f.style.width = target + '%';
    });
    const numEl = $('#overall-num');
    if(numEl){
      let cur = 0; const target = state.result.overall;
      const step = () => { cur += Math.max(1, Math.round((target-cur)/6)); if(cur>=target){ cur=target; } numEl.textContent = cur; if(cur<target) requestAnimationFrame(step); };
      step();
    }
    if(state.result.decision === 'invest' || state.result.decision === 'acquire'){
      fireConfetti();
    }
  });
}

/* ---------------- Confetti (self-contained canvas) ---------------- */
function fireConfetti(){
  const canvas = $('#confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#e8b854','#2bb8b0','#4cb963','#b98ee0','#f3d79a'];
  const pieces = Array.from({length:140}, () => ({
    x: Math.random()*canvas.width,
    y: -20 - Math.random()*canvas.height*0.3,
    w: 6+Math.random()*6, h: 8+Math.random()*8,
    vy: 2+Math.random()*3, vx: -1.5+Math.random()*3,
    rot: Math.random()*360, vr: -6+Math.random()*12,
    color: colors[Math.floor(Math.random()*colors.length)]
  }));
  let frame = 0;
  function tick(){
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if(frame < 210) requestAnimationFrame(tick);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  tick();
}
window.addEventListener('resize', () => {
  const canvas = $('#confetti-canvas');
  if(canvas){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
});

/* ---------------- Boot ---------------- */
(async function boot(){
  await loadLeaderboard();
  render();
})();
</script>
